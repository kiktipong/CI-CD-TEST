name: PHP CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2

    - name: Install dependencies
      run: composer install

    - name: Run Lint (CodeSniffer)
      run: ./vendor/bin/phpcs src/

    - name: Run Tests
      run: composer test
